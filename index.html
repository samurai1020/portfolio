<!DOCTYPE html>
<html lang="en">
<head>
  <title>Samurai Portfolio Web Developer</title>
  <title>Portfolio - Samurai</title>
<meta name="description" content="My portfolio website showcasing my projects and skills">
  <meta name="google-site-verification" content="I2Let45FTsX6oN0jlBLeFMNa-2Lrc8HXjrJoFZ1XdAs" />
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovaDesign Pro</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}

body{
  background: radial-gradient(circle at 20% 20%, #1a0022, #000000 60%),
              radial-gradient(circle at 80% 80%, #001a1a, #000000 60%);
  color:white;
  overflow-x:hidden;
}

/* particles */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:radial-gradient(circle, rgba(255,0,100,0.12) 1px, transparent 1px);
  background-size:50px 50px;
  animation:moveBg 25s linear infinite;
  z-index:-1;
  opacity:0.6;
}

@keyframes moveBg{
  from{transform:translateY(0)}
  to{transform:translateY(100px)}
}

header{
  padding:20px;
  text-align:center;
}

header h1{
  color:#ff2a6d;
  text-shadow:
    0 0 10px #ff2a6d,
    0 0 20px #ff2a6d,
    0 0 40px #7f5af0;
}

.hero{
  padding:50px;
  text-align:center;
}

.hero h2{
  font-size:40px;
  background:linear-gradient(90deg,#ff2a6d,#7f5af0,#00d4ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.upload-box{
  text-align:center;
  margin:20px;
}

button{
  background: linear-gradient(135deg, #ff2a6d, #7f5af0);
  color:white;
  border:none;
  padding:10px 20px;
  border-radius:25px;
  cursor:pointer;
  transition:0.3s;
  box-shadow:0 0 10px rgba(255,42,109,0.5);
}

button:hover{
  transform:scale(1.05);
  box-shadow:
    0 0 15px #ff2a6d,
    0 0 30px #7f5af0;
}

.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:20px;
  padding:40px;
}

.gallery:hover .card{
  background:rgba(255,255,255,0.05);
  border-radius:15px;
  overflow:hidden;
  position:relative;
  transition:0.4s;
  animation:fadeIn 0.8s ease;
  backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,0.08);
}

.card{
  background:#111;
  border-radius:15px;
  overflow:hidden;
  position:relative;
  transition:0.4s;
  animation:fadeIn 0.8s ease;
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}

.card:hover{
  transform:scale(1.05);
  box-shadow:
    0 0 20px #ff2a6d,
    0 0 40px #7f5af0;
  filter:none !important;
  opacity:1 !important;
}

.card img{
  width:100%;
  max-height:200px;
  object-fit:contain;
}

.delete-btn{
  position:absolute;
  top:10px;
  right:10px;
  background:red;
  border:none;
  color:white;
  border-radius:50%;
  width:30px;
  height:30px;
  cursor:pointer;
  opacity:0;
  transition:0.3s;
}

.card:hover .delete-btn{
  opacity:1;
}

#modal{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.95);
  justify-content:center;
  align-items:center;
}

#modal img{
  max-width:90%;
  max-height:90%;
}

</style>
</head>
<body>

<header>
  <h1>NovaDesign</h1>
</header>

<section class="hero">
  <h2>My Digital Art Portfolio</h2>
</section>

<div class="upload-box">
  <input type="file" id="upload" multiple>
  <br><br>
  <button onclick="addImages()">Upload Images</button>
  <br><br>
  <button onclick="toggleDeleteMode()" id="deleteModeBtn">🗑️ Delete Mode OFF</button>
</div>

<div class="gallery" id="gallery"></div>

<div id="modal">
  <img id="modalImg">
</div>

<!-- Firebase (ONLINE STORAGE) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
// 🔥 ضع معلومات Firebase ديالك هنا
const firebaseConfig = {
  apiKey: "AIzaSyDO4166rxdnfBkGegQImvgju9G7ELliTY",
  authDomain: "novadesign-66b38.firebaseapp.com",
  projectId: "novadesign-66b38",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const gallery = document.getElementById('gallery');
const modal = document.getElementById('modal');
const modalImg = document.getElementById('modalImg');
let deleteMode = false;

// LOAD images ONLINE
window.onload = ()=>{
  db.collection("images").get().then(snapshot=>{
    snapshot.forEach(doc=>{
      createImage(doc.data().src, doc.id);
    })
  })
}

function toggleDeleteMode(){
  deleteMode = !deleteMode;
  const btn = document.getElementById('deleteModeBtn');
  btn.innerText = deleteMode ? '🗑️ Delete Mode ON' : '🗑️ Delete Mode OFF';
}

function createImage(src, id){
  const card = document.createElement('div');
  card.className = 'card';

  const img = document.createElement('img');
  img.src = src;

  img.onclick = ()=>{
    if(deleteMode){
      db.collection("images").doc(id).delete();
      card.remove();
      return;
    }
    modal.style.display='flex';
    modalImg.src = img.src;
  }

  const del = document.createElement('button');
  del.innerHTML='✕';
  del.className='delete-btn';
  del.onclick = (ev)=>{
    ev.stopPropagation();
    db.collection("images").doc(id).delete();
    card.remove();
  }

  card.appendChild(del);
  card.appendChild(img);
  gallery.appendChild(card);
}

function addImages(){
  const files = document.getElementById('upload').files;

  Array.from(files).forEach(file=>{
    const reader = new FileReader();

    reader.onload = function(e){
      db.collection("images").add({src:e.target.result}).then(doc=>{
        createImage(e.target.result, doc.id);
      });
    }

    reader.readAsDataURL(file);
  })
}

modal.onclick = ()=> modal.style.display='none';
</script>

</body>
</html>
